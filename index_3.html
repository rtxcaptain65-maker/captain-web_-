<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รูปอันบาดหัวใจของกู</title>
    <div class="header">
    <h1>🚨แนะนำอย่าเปิด🚨<h1>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .header {
            text-align: center;
            padding: 20px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-container {
            width: 95vw;
            height: 70vh;
            background-color: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .image-container img.hidden {
            display: none;
        }

        .toggle-button {
            min-width: 250px;
            padding: 25px 50px;
            font-size: 2rem;
            color: white;
            background: #FF6B6B;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
        }

        .toggle-button.off {
            background: #4a5568;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .toggle-button {
                min-width: 200px;
                padding: 20px 40px;
                font-size: 1.5rem;
            }
            .image-container {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>รูปอันบาดหัวใจของกู</h1>
    </div>

    <div class="container">
        <div class="image-container" id="imageContainer">
            <img src="https://filthy-yellow-xadoubmuga.edgeone.app/Screenshot_2026-03-11-20-49-46-108_com.miui.mediaviewer-edit.jpg" 
                 id="myImage" 
                 class="hidden">
        </div>

        <button class="toggle-button" id="toggleBtn" onclick="toggleImage()">
            เปิดรูป
        </button>
    </div>

    <script>
        let isImageVisible = false;
        const image = document.getElementById('myImage');
        const toggleBtn = document.getElementById('toggleBtn');

        function toggleImage() {
            if (isImageVisible) {
                image.classList.add('hidden');
                toggleBtn.textContent = 'เปิดรูป';
                toggleBtn.classList.add('off');
                isImageVisible = false;
            } else {
                image.classList.remove('hidden');
                toggleBtn.textContent = 'ปิดรูป';
                toggleBtn.classList.remove('off');
                isImageVisible = true;
            }
        }

        image.classList.add('hidden');
        toggleBtn.classList.add('off');
    </script>
</body>
</html>
